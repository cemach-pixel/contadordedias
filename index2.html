<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Contador</title>

<!-- Fuente Montserrat -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">

<style>
body {
  background: #0b5394;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  font-family: 'Montserrat', sans-serif;
}

#contador {
  text-align: center;
  font-size: 28px;
  font-weight: 700;
  color: #000000; /* azul marino */
  
  background: #ffffff; /* naranja amarillento claro */
  padding: 40px 60px;
  border-radius: 20px;
  box-shadow: 0 8px 20px rgba(0, 31, 63, 0.3);
  animation: pulse 1s infinite alternate;
}

/* Resaltar los números */
#contador span {
  color: #FF8400; /*  naranja más brillante */
  text-shadow: .5px .5px 1px rgba(0, 31, 63, 0.6);
  
}

/* Animación de pulso */
@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.03); }
  100% { transform: scale(1); }
}
</style>
</head>
<body>

<div id="contador"></div>

<script>
const fechaObjetivo = new Date("2026-05-24T08:00:00").getTime();

const contador = setInterval(() => {
  const ahora = new Date().getTime();
  const diferencia = fechaObjetivo - ahora;

  if (diferencia <= 0) {
    clearInterval(contador);
    document.getElementById("contador").innerHTML = "¡EL EVENTO HA COMENZADO!";
    return;
  }

  const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
  const horas = Math.floor((diferencia / (1000 * 60 * 60)) % 24);
  const minutos = Math.floor((diferencia / (1000 * 60)) % 60);
  const segundos = Math.floor((diferencia / 1000) % 60);

  document.getElementById("contador").innerHTML =
    `¡FALTAN <span>${dias}</span> DÍAS, <span>${horas}</span> HORAS, <span>${minutos}</span> MINUTOS Y <span>${segundos}</span> SEGUNDOS!`;
}, 1000);
</script>

</body>
</html>
